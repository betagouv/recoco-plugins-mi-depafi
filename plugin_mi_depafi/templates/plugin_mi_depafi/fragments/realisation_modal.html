{% load django_vite %}
{% block css %}
    {% vite_asset 'js/plugins/styles/fragments/realisation-modal.css.js' %}
{% endblock css %}
<dialog id="realisation-modal"
        class="fr-modal realisation-modal"
        aria-labelledby="realisation-modal-title"
        role="dialog">
    <div class="fr-container fr-container--fluid fr-container-md">
        <div class="fr-grid-row fr-grid-row--center">
            <div class="fr-col-12 fr-col-md-10 fr-col-lg-8">
                <div class="fr-modal__body">
                    <div class="realisation-modal__header">
                        <button class="fr-btn--close realisation-modal__close fr-pr-1w"
                                title="Fermer"
                                aria-controls="realisation-modal"
                                type="button">
                            Fermer
                        </button>
                    </div>
                    <div class="realisation-modal__content" id="realisation-modal-content">
                        {# Filled by HTMX on demand #}
                    </div>
                </div>
            </div>
        </div>
    </div>
</dialog>

<script>
document.body.addEventListener('htmx:configRequest', (event) => {
    const token = document.cookie.match(/csrftoken=([^;]+)/)?.[1];
    if (token) event.detail.headers['X-CSRFToken'] = token;
});

document.getElementById('realisation-modal-content').addEventListener('htmx:afterSwap', () => {
    window.dsfr(document.getElementById('realisation-modal')).modal.disclose();
});
</script>
